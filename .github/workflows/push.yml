name: push

# Slimmed down from upstream (gpuweb/cts) for the webgpu-tools fork:
# runs only the checks that guard our additions in src/common and
# transpiler/ (node tsc build, typecheck, lint). Upstream's full
# `npm test` (grunt all: cache gen, standalone/WPT builds, tsdoc) and
# the gh-pages deploy of the standalone runner are dropped. Revisit
# this file when an upstream merge touches push.yml.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v2.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@v2-beta
        with:
          node-version: "16.x"
      - run: npm ci
      - run: npx grunt run:generate-version run:generate-listings-and-webworkers run:build-out-node ts-check run:lint
